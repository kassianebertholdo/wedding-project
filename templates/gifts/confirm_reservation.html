{% extends 'base.html' %}

{% block title %}
Confirmar Reserva
{% endblock %}


{% block extra_css %}

<style>

.card{
    background:white;

    max-width:500px;

    margin:60px auto;

    border-radius:20px;

    overflow:hidden;

    box-shadow:
    0 10px 20px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:350px;
    object-fit:cover;
}

.content{
    padding:30px;
    text-align:center;
}

.content h1{
    color:#d63384;
}

.price{
    font-size:1.5rem;
    margin:20px 0;
}

button{
    background:#d63384;
    color:white;

    border:none;

    padding:15px 30px;

    border-radius:10px;

    cursor:pointer;

    font-size:1rem;
}

</style>

{% endblock %}


{% block content %}

<div class="card">

    <img src="{{ gift.image.url }}">

    <div class="content">

        <h1>
            {{ gift.name }}
        </h1>

        <p>
            {{ gift.description }}
        </p>

        <div class="price">

            R$ {{ gift.price }}

        </div>

        <form method="POST">

            {% csrf_token %}

            <button type="submit">

                Confirmar Reserva

            </button>

        </form>

    </div>

</div>

{% endblock %}
